name: Firmware CI

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Install toolchain
      run: |
        sudo apt update
        sudo apt install gcc-arm-none-eabi cmake cppcheck clang-tidy

    - name: Configure
      run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=toolchain/arm-gcc-toolchain.cmake

    - name: Build
      run: cmake --build build

    - name: Check code formatting without modifying files if errors are found
      run: clang-format -n --Werror src/*.cpp include/*.hpp

    - name: Static analysis with cppcheck
      run: ./scripts/static_analysis.sh

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          build/*.elf
          build/*.bin
          build/*.hex